name: Keepalive (monthly)

on:
  schedule:
    - cron: "15 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: keepalive
  cancel-in-progress: true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update keepalive stamp
        run: |
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt

      - name: Commit & push if changed (including untracked)
        run: |
          # Ajoute le fichier (même s'il est nouveau) pour qu'il soit pris en compte
          git add .github/keepalive.txt

          # Si rien à commiter (y compris nouveaux fichiers), on sort
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: keepalive"
          git push
